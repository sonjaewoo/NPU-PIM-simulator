[dram_structure]
protocol = LPDDR5
bankgroups = 2
banks_per_group = 4
rows = 65536
columns = 1024
device_width = 16
BL = 16 

[timing]
tCK = 0.3125
AL      = 0
CL      = 20       # nCL=20 (LPDDR5 JEDEC bin, CAS latency 증가)
CWL     = 11       # nCWL=11 (write latency 단축)
tRCD    = 15       # nRCD=15
tRP     = 17       # nRP=17 (precharge latency 증가)
tRAS    = 34       # nRAS=34
tRFC    = 800      # density=16Gb typical, refresh cycle 훨씬 길어짐
tRFC2   = 550      # JEDEC LPDDR5 typical 비율 반영 (~tRFC*0.7)
tRFC4   = 350      # JEDEC LPDDR5 typical 비율 반영 (~tRFC*0.44)
tREFI   = 3900     # 3.9 µs, LPDDR4 대비 절반 refresh interval
tRPRE   = 1
tWPRE   = 1
tRRD_S  = 4        # nRRD_S=4 (LPDDR4=8 → bank-group 최적화로 단축)
tRRD_L  = 4        # nRRD_L=4
tWTR_S  = 5        # nWTRS=5
tWTR_L  = 10       # nWTRL=10
tFAW    = 16       # nFAW=16 (LPDDR4=32 → 절반)
tWR     = 28       # nWR=28
tWR2    = 30       # write → read recovery, 추정치
tRTP    = 4        # nRTP=4
tCCD_S  = 4        # nCCD=4
tCCD_L  = 4
tCKE    = 6
tCKESR  = 7
tXS     = 900      # self-refresh exit time, tRFC보다 긴 값 (LPDDR5 증가)
tXP     = 6
tRTRS   = 1
tPPD    = 2

[power]
VDD     = 1.05
IDD0    = 90       # active idle 전류 (LPDDR4보다 소폭 증가)
IPP0    = 4.5
IDD2P   = 30
IDD2N   = 38
IDD3P   = 45
IDD3N   = 52
IDD4W   = 250
IDD4R   = 270
IDD5AB  = 320
IDD6x   = 35

[system]
channel_size = 8192
channels = 1
bus_width = 64
address_mapping = robarabgcoch
queue_structure = PER_BANK
refresh_policy = RANK_LEVEL_STAGGERED
row_buf_policy = OPEN_PAGE
cmd_queue_size = 8
trans_queue_size = 32

[other]
epoch_period = 1204819
output_level = 1
